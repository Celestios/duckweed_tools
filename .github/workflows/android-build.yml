name: Build Android WebView Wrapper APK

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compile and Package APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Gradle 8.2
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2

    - name: Generate and Commit Permanent debug.keystore
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        if [ ! -f duckweed_tools_android/app/debug.keystore ]; then
          echo "Generating permanent keystore..."
          keytool -genkeypair -v -keystore duckweed_tools_android/app/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          git add duckweed_tools_android/app/debug.keystore
          git commit -m "Add permanent debug keystore for updateable app [CI SKIP]"
          git push origin HEAD:main
        else
          echo "Permanent keystore already exists. Reusing..."
        fi

    - name: Install Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b
        link-to-sdk: true

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Cargo Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          duckweed_tools_rust/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('duckweed_tools_rust/Cargo.lock') }}

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Build Rust Server for Android
      run: |
        cd duckweed_tools_rust
        cargo ndk -t arm64-v8a build --release

    - name: Copy Binary to Android jniLibs
      run: |
        mkdir -p duckweed_tools_android/app/src/main/jniLibs/arm64-v8a
        cp duckweed_tools_rust/target/aarch64-linux-android/release/duckweed-server duckweed_tools_android/app/src/main/jniLibs/arm64-v8a/libduckweed-server.so

    - name: Build Android Debug APK
      run: |
        cd duckweed_tools_android
        gradle assembleDebug

    - name: Rename APK for Release
      run: |
        cp duckweed_tools_android/app/build/outputs/apk/debug/app-debug.apk duckweed-toolkit.apk

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: duckweed-toolkit-apk
        path: duckweed-toolkit.apk

    - name: Create GitHub Release and Upload APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: duckweed-toolkit.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
