name: Build Android WebView Wrapper APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compile and Package APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Install Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b
        link-to-sdk: true

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Cargo Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          duckweed_tools_rust/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('duckweed_tools_rust/Cargo.lock') }}

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Build Rust Server for Android
      run: |
        cd duckweed_tools_rust
        cargo ndk -t arm64-v8a build --release

    - name: Copy Binary to Android Assets
      run: |
        mkdir -p duckweed_tools_android/app/src/main/assets
        cp duckweed_tools_rust/target/aarch64-linux-android/release/duckweed-server duckweed_tools_android/app/src/main/assets/duckweed-server

    - name: Setup Gradle
      run: |
        cd duckweed_tools_android
        chmod +x gradlew

    - name: Build Android Debug APK
      run: |
        cd duckweed_tools_android
        ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: duckweed-toolkit-apk
        path: duckweed_tools_android/app/build/outputs/apk/debug/app-debug.apk
